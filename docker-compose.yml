services:
  mysql:
    image: mysql:8.0
    container_name: groupflow-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: groupflow
      MYSQL_USER: groupflow
      MYSQL_PASSWORD: groupflow
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - groupflow-net

  redis:
    image: redis:7-alpine
    container_name: groupflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - groupflow-net

  kafka:
    image: bitnami/kafka:3.7
    container_name: groupflow-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - groupflow-net

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: groupflow-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./deploy/kafka/create-topics.sh:/create-topics.sh:ro
    command: ["bash", "/create-topics.sh"]
    networks:
      - groupflow-net

  groupflow-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: groupflow-api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      HTTP_ADDR: :8080
      SERVER_ID: ws-server-01
      WS_INTERNAL_PUSH_URL: http://groupflow-api:8080/internal/push
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - groupflow-net

  groupflow-delivery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: groupflow-delivery
    restart: unless-stopped
    command: ["/app/groupflow-delivery"]
    env_file:
      - ./.env
    environment:
      HTTP_ADDR: :8082
      WS_INTERNAL_PUSH_URL: http://groupflow-api:8080/internal/push
    ports:
      - "8082:8082"
    depends_on:
      groupflow-api:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    networks:
      - groupflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: groupflow-frontend
    restart: unless-stopped
    depends_on:
      - groupflow-api
    networks:
      - groupflow-net

  nginx:
    image: nginx:1.27-alpine
    container_name: groupflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - groupflow-api
    networks:
      - groupflow-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: groupflow-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - groupflow-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: groupflow-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - groupflow-net

  loki:
    image: grafana/loki:3.1.0
    container_name: groupflow-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - groupflow-net

  promtail:
    image: grafana/promtail:3.1.0
    container_name: groupflow-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - groupflow-net

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  groupflow-net:
    driver: bridge
