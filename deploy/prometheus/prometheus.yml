global:
  scrape_interval: 15s
scrape_configs:
  - job_name: groupflow-api
    static_configs:
      - targets: ["groupflow-api:8080"]
  - job_name: groupflow-delivery
    static_configs:
      - targets: ["groupflow-delivery:8082"]
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
