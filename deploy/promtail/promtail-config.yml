# GroupFlow Promtail：通过 Docker 服务发现采集 groupflow 各服务的 stdout JSON 日志，
# 解析后以 service / level 作为低基数标签推送到 Loki，traceId 等高基数字段保留在日志正文中检索。
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: groupflow-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 只采集 groupflow-api / groupflow-delivery 等业务容器
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: 'groupflow-.*'
        action: keep
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
    pipeline_stages:
      # 应用输出 JSON 结构化日志，提取 level/service 作为标签，提取 timestamp 作为时间戳
      - json:
          expressions:
            level: level
            app_service: service
            ts: timestamp
      - timestamp:
          source: ts
          format: RFC3339Nano
      - labels:
          level:
